<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="expense.css">
</head>

<body>

    <div class="app">

        <!-- Header -->

        <div class="header">
            <h1> Expense Tracker</h1>
            <p> “Track your spending, control your future.” </p>
        </div>

        <!-- Balance-Income-Expense. -->
        <div class="Balance-Income-Expense">
            <div class="metric">
                <div class="label">Balance</div>
                <div class="value" id="balance">$0</div>
            </div>

            <div class="metric income">
                <div class="label">Income</div>
                <div class="value" id="total-income">$0</div>
            </div>

            <div class="metric expense">
                <div class="label">Expense</div>
                <div class="value" id="total-expense">$0</div>
            </div>

        </div>

        <!-- Description Form card -->
        <div class="form-card">
            <h2> Add Description</h2>

            <label>Description</label>
            <input type="text" id="desc" placeholder=" Salary, Rent..." />

            <label>Amount</label>
            <input type="number" id="amount" placeholder="0" />

            <label> Type</label>
            <select id="type">
                <option value="expense">Expense</option>
                <option value="income">Income</option>
            </select>

            <label> Category</label>
            <select id=" Category">
                <option value="food">food</option>
                <option value="outing">outing</option>
                <option value="grocery">grocery</option>
                <option value="bills">bills</option>
                <option value="shopping">shopping</option>
                <option value="other">other</option>
            </select>

            <label>Date</label>
            <input type="date" id="date" />

            <button onclick="addTransaction()"> +Add transaction</button>

        </div>

        <!-- Transaction List -->
        <div id="list"> </div>


    </div>


    
</body>

</html>
